<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ede0c4" id="metaThemeColor">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Облік часу</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /*
    Чотири теми: паперова світла (дефолт), паперова темна,
    термінал зелений, термінал янтарний.
    Папір ділить більшість змінних з темою на тілі тег <html data-style="paper" data-mode="light">.
    Термінал — окремий світ зі своїми правилами (моноширинний, сканлайни).

    --serif і --mono лишаються глобально, бо стиль міняє лише ВАГУ типографіки в окремих місцях.
  */

  :root {
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', 'Courier New', monospace;

    /* Папір-світла (дефолт) — теплий кремовий */
    --bg: #ede0c4;
    --bg-elev: #e3d4b3;
    --bg-elev-2: #d8c79f;
    --border: #b8a47a;
    --line: #c0aa7d;
    --text: #2a1f14;
    --text-dim: #6e5a3e;
    --text-faint: #998560;
    --accent: #a04515;       /* печаткова сангіна */
    --accent-dim: #7a3410;
    --danger: #983020;
    --footer-value: #6b3408;
    --modal-overlay-bg: rgba(40,28,12,0.45);
    --seg-shadow: rgba(80,50,20,0.10);
    --accent-tint: rgba(160,69,21,0.10);
    --accent-tint-faint: rgba(160,69,21,0.05);
    --noise-opacity: 0.6;
    --noise-blend: multiply;
  }

  [data-style="paper"][data-mode="dark"] {
    /* Папір-темна — горіхове дерево / стара шкіра */
    --bg: #1c1610;
    --bg-elev: #261d14;
    --bg-elev-2: #2f2418;
    --border: #4a3a26;
    --line: #3d2f1e;
    --text: #e8d8b6;
    --text-dim: #a08b66;
    --text-faint: #6a583c;
    --accent: #d4a574;
    --accent-dim: #8a6a4a;
    --danger: #c45a5a;
    --footer-value: #e8c090;
    --modal-overlay-bg: rgba(0,0,0,0.6);
    --seg-shadow: rgba(0,0,0,0.4);
    --accent-tint: rgba(212,165,116,0.08);
    --accent-tint-faint: rgba(212,165,116,0.05);
    --noise-opacity: 0.25;
    --noise-blend: screen;
  }

  [data-style="terminal"][data-mode="green"] {
    /* Термінал зелений */
    --bg: #0a0e0a;
    --bg-elev: #0e1410;
    --bg-elev-2: #131c14;
    --border: #1a3520;
    --line: #1a3520;
    --text: #4afa6e;
    --text-dim: #2a8a3e;
    --text-faint: #1a4a26;
    --accent: #ffb000;       /* янтарний як акцент */
    --accent-dim: #a06800;
    --danger: #ff5050;
    --footer-value: #ffb000;
    --modal-overlay-bg: rgba(0,0,0,0.75);
    --seg-shadow: rgba(0,0,0,0.5);
    --accent-tint: rgba(255,176,0,0.08);
    --accent-tint-faint: rgba(74,250,110,0.06);
    --noise-opacity: 0;
    --scanline-opacity: 0.4;
  }

  [data-style="terminal"][data-mode="amber"] {
    /* Термінал янтарний — IBM CRT */
    --bg: #0e0a05;
    --bg-elev: #15100a;
    --bg-elev-2: #1f1810;
    --border: #3a2800;
    --line: #3a2800;
    --text: #ffb000;
    --text-dim: #a06800;
    --text-faint: #5a3a00;
    --accent: #ffd060;
    --accent-dim: #c08840;
    --danger: #ff5050;
    --footer-value: #ffd060;
    --modal-overlay-bg: rgba(0,0,0,0.75);
    --seg-shadow: rgba(0,0,0,0.5);
    --accent-tint: rgba(255,208,96,0.08);
    --accent-tint-faint: rgba(255,176,0,0.05);
    --noise-opacity: 0;
    --scanline-opacity: 0.4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.4;
    overscroll-behavior: none;
    height: 100%;
  }

  /* Термінал — моноширинний всюди, серіф витісняється */
  [data-style="terminal"] body {
    font-family: var(--mono);
    font-size: 14px;
  }

  body {
    /* dynamic viewport - враховує адресну стрічку браузера */
    height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Текстура паперу — SVG-шум через ::before. Тільки в стилі "paper".
     В світлій темі шум темніший (multiply), в темній — світліший (screen). */
  [data-style="paper"] body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: var(--noise-opacity);
    mix-blend-mode: var(--noise-blend);
    background-size: 200px 200px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.15  0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  [data-style="paper"][data-mode="dark"] body::before {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.35  0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* CRT-сканлайни — тільки в терміналі, ледь помітні */
  [data-style="terminal"] body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: var(--scanline-opacity);
    background: linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.18) 3px,
      transparent 4px
    );
    background-size: 100% 4px;
  }

  button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; font-size: inherit; }

  input, select {
    font-family: var(--mono);
    color: var(--text);
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 17px;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  input[type="time"] { font-variant-numeric: tabular-nums; }

  /* HEADER */
  header {
    display: grid;
    grid-template-columns: 44px 1fr 44px 44px;
    align-items: center;
    padding: 12px 8px;
    border-bottom: 1px solid var(--border);
    gap: 4px;
  }

  .nav-btn {
    height: 44px;
    width: 44px;
    display: grid;
    place-items: center;
    color: var(--text-dim);
    font-size: 24px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .nav-btn:active { background: var(--bg-elev); }

  .week-title {
    position: relative;
    text-align: center;
    font-family: var(--serif);
    font-weight: 500;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.15s;
    line-height: 1.2;
  }
  .week-title:active { background: var(--bg-elev); }
  .week-title .week-range { font-size: 17px; }
  .week-title .week-num { font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; letter-spacing: 0.5px; }
  .date-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    border: 0;
    padding: 0;
    cursor: pointer;
    background: transparent;
    /* приховує дефолтну іконку календаря в Chrome, щоб не лізла поверх */
    color: transparent;
  }
  .date-overlay::-webkit-calendar-picker-indicator {
    opacity: 0;
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    cursor: pointer;
  }

  /* DAYS LIST */
  main {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 8px 0;
  }

  .day-row {
    display: grid;
    grid-template-columns: 44px 36px 1fr auto;
    align-items: center;
    padding: 16px 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    min-height: 64px;
  }
  /* Папір — пунктир як у зошитному щоденнику */
  [data-style="paper"] .day-row {
    border-bottom: 1px dashed var(--line);
  }
  .day-row:active { background: var(--bg-elev); }
  .day-row.today { background: linear-gradient(90deg, var(--accent-tint-faint), transparent 60%); }
  .day-row.today .day-name { color: var(--accent); }

  .day-name {
    font-family: var(--mono);
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text-dim);
  }
  .day-num {
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .day-info {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .day-info.empty { color: var(--text-faint); font-style: italic; font-family: var(--serif); }
  .day-info.dayoff { color: var(--text-dim); }
  .day-hours {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  /* FOOTER (week total) */
  footer {
    border-top: 1px solid var(--border);
    background: var(--bg-elev);
    padding: 18px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  /* Папір — товстіша подвійна лінія, як у газеті */
  [data-style="paper"] footer {
    border-top: 2px solid var(--line);
  }
  .footer-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .footer-value {
    font-family: var(--serif);
    font-size: 40px;
    font-weight: 500;
    color: var(--footer-value);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -0.5px;
  }
  /* Папір — opsz "розкриває" Fraunces на великих числах, теплі заокруглення */
  [data-style="paper"] .footer-value {
    font-weight: 400;
    font-size: 48px;
    font-variation-settings: "opsz" 144;
    letter-spacing: -1px;
  }
  /* Термінал — моноширинний, не серіф */
  [data-style="terminal"] .footer-value {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 0;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--modal-overlay-bg);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal {
    background: var(--bg-elev);
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    animation: slideUp 0.25s ease;
  }
  /* Термінал — без скруглень, чіткі рамки */
  [data-style="terminal"] .modal {
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    border: 1px solid var(--text);
    border-bottom: none;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
  }
  .modal-subtitle {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .modal-close {
    color: var(--text-dim);
    font-size: 24px;
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
  }

  /* SEGMENTED CONTROL */
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--bg-elev-2);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 20px;
  }
  .seg button {
    padding: 12px;
    border-radius: 7px;
    font-family: var(--serif);
    font-size: 16px;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .seg button.active {
    background: var(--bg);
    color: var(--accent);
    box-shadow: 0 1px 3px var(--seg-shadow);
  }

  /* FIELDS */
  .field { margin-bottom: 16px; }
  .field-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BREAK SECTION */
  .break-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    cursor: pointer;
  }
  .break-toggle input[type="checkbox"] {
    width: 22px;
    height: 22px;
    accent-color: var(--accent);
  }
  .break-toggle span { font-family: var(--serif); font-size: 16px; }

  .break-options { display: none; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .break-options.visible { display: flex; }
  .break-chip {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    background: var(--bg-elev-2);
  }
  .break-chip.active { color: var(--accent); border-color: var(--accent); background: var(--accent-tint); }

  /* DURATION PREVIEW */
  .duration-preview {
    margin-top: 20px;
    padding: 16px;
    background: var(--bg-elev-2);
    border-radius: 12px;
    text-align: center;
  }
  .duration-preview .label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .duration-preview .value {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 500;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .duration-preview .value.invalid { color: var(--danger); font-size: 18px; }

  /* BUTTONS */
  .btn-row {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    padding: 14px 20px;
    border-radius: 10px;
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:active { background: var(--accent-dim); }
  .btn-primary:disabled { background: var(--bg-elev-2); color: var(--text-faint); }
  .btn-ghost {
    color: var(--text-dim);
    background: var(--bg-elev-2);
  }
  .btn-ghost:active { background: var(--border); }
  .btn-danger {
    color: var(--danger);
    background: transparent;
    border: 1px solid rgba(196, 90, 90, 0.3);
    width: 100%;
    margin-top: 12px;
  }
  .btn-danger:active { background: rgba(196, 90, 90, 0.1); }

  /* SETTINGS */
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 12px;
  }
  .export-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    background: var(--bg-elev-2);
    border-radius: 10px;
    margin-bottom: 8px;
    width: 100%;
    transition: background 0.15s;
  }
  .export-btn:active { background: var(--border); }
  .export-btn .label {
    font-family: var(--serif);
    font-size: 16px;
    text-align: left;
  }
  .export-btn .arrow { color: var(--accent); font-size: 18px; }

  /* JOB LIST (вибір активної роботи) */
  .job-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .job-item {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg-elev-2);
    border-radius: 10px;
    border: none;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    font-family: var(--serif);
    font-size: 16px;
    transition: background 0.15s;
  }
  .job-item:active { background: var(--border); }
  .job-item.active {
    background: var(--accent-tint);
    border-left: 3px solid var(--accent);
    padding-left: 11px;
  }
  .job-marker { color: var(--accent); font-size: 14px; }
  .job-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* HIDDEN UTILITY */
  .hidden { display: none !important; }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.6;
  }

  /* STATS */
  .stats {
    background: var(--bg-elev-2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .stat-cell { display: flex; flex-direction: column; gap: 2px; }
  .stat-cell.full { grid-column: 1 / -1; }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.small { font-size: 16px; color: var(--text); }
  .stats-empty {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-family: var(--serif);
    font-style: italic;
  }

  /* PRINT / REPORT AREA — стилі для PDF-документа.
     Не під @media print, бо потрібно щоб html2canvas їх бачив.
     На екрані ховаємо через display: none. */
  #printArea {
    display: none;
    background: white;
    color: black;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 11pt;
    width: 794px; /* ~A4 ширина при 96dpi */
    padding: 40px 36px;
    box-sizing: border-box;
  }
  #printArea h1 {
    font-size: 26pt;
    font-weight: 600;
    margin: 0 0 14px 0;

// Шорткат для перекладу — читає поточну мову з state
function t(key) {
  return I18N[state.lang][key] || I18N.uk[key] || key;
}

// Локалізована множина для тижнів — українська має 3 форми, англійська 2
function pluralWeeks(n) {
  if (state.lang === 'en') return n === 1 ? 'week' : 'weeks';
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'тиждень';
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return 'тижні';
  return 'тижнів';
}

// ============ STATE ============
let state = {
  // Список робіт. Кожна робота — окремий запис з власними днями.
  workers: {},          // { 'w_1': { name: 'Робота 1', days: {...} }, ... }
  activeWorkerId: null, // ID активної роботи

  // Стиль і режими — кожен стиль памʼятає свою варіацію незалежно
  style: 'paper',       // 'paper' | 'terminal'
  paperMode: 'light',   // 'light' | 'dark'  (для папір)
  termMode: 'green',    // 'green' | 'amber' (для термінал)
  lang: 'uk'            // 'uk' | 'en'
};
let currentMonday = mondayOf(new Date());
let editingDate = null;
let editDraft = null;

// ============ WORKERS HELPERS ============
// Повертає активну роботу. Гарантовано існує (load() створює одну при старті).
function getActiveWorker() {
  return state.workers[state.activeWorkerId];
}
// Записи днів активної роботи. { 'YYYY-MM-DD': { start, end, breakMin, dayOff } }
function getActiveDays() {
  const w = getActiveWorker();
  return w ? w.days : {};
}
// Згенерувати унікальний ID для нової роботи
function genWorkerId() {
  return 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

// ============ STORAGE ============
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        // Налаштування інтерфейсу
        state.lang = (parsed.lang === 'en' || parsed.lang === 'uk') ? parsed.lang : 'uk';
        state.style = (parsed.style === 'terminal' || parsed.style === 'paper') ? parsed.style : 'paper';
        state.paperMode = (parsed.paperMode === 'dark' || parsed.paperMode === 'light') ? parsed.paperMode : 'light';
        state.termMode  = (parsed.termMode === 'amber' || parsed.termMode === 'green') ? parsed.termMode : 'green';
        // Міграція стилю: якщо стилю не було, але старе theme === 'dark'
        if (!parsed.style && parsed.theme === 'dark') state.paperMode = 'dark';

        // Робочі дані: нова схема (workers) або стара (workerName + days)
        if (parsed.workers && typeof parsed.workers === 'object' && parsed.activeWorkerId) {
          state.workers = parsed.workers;
          state.activeWorkerId = parsed.activeWorkerId;
        } else if (parsed.workerName !== undefined || parsed.days) {
          // Міграція зі старої схеми: створюємо одну роботу з наявним іменем і днями
          const id = genWorkerId();
          state.workers = {
            [id]: {
              name: parsed.workerName || '',
              days: parsed.days || {}
            }
          };
          state.activeWorkerId = id;
        }
      }
    }
  } catch (e) {
    console.warn('Load failed', e);
  }
  // Якщо нічого не завантажено — створюємо першу порожню роботу
  if (!state.activeWorkerId || !state.workers[state.activeWorkerId]) {
    const id = genWorkerId();
    state.workers = { [id]: { name: '', days: {} } };
    state.activeWorkerId = id;
  }
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Save failed', e);
  }
}

// ============ DATE HELPERS ============
function mondayOf(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function isoDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function ddmmyyyy(date) {
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  return `${d}.${m}.${y}`;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

function weekDates(monday) {
  return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
}

function formatWeekRange(monday) {
  const sunday = addDays(monday, 6);
  const m1 = MONTH_SHORT[state.lang][monday.getMonth()];
  const m2 = MONTH_SHORT[state.lang][sunday.getMonth()];
  const y1 = monday.getFullYear();
  const y2 = sunday.getFullYear();
  if (m1 === m2 && y1 === y2) {
    return `${monday.getDate()}–${sunday.getDate()} ${m1} ${y1}`;
  }
  if (y1 === y2) {
    return `${monday.getDate()} ${m1} – ${sunday.getDate()} ${m2} ${y1}`;
  }
  return `${monday.getDate()} ${m1} ${y1} – ${sunday.getDate()} ${m2} ${y2}`;
}

function formatLongDay(date) {
  const dn = DAY_NAMES_LONG[state.lang][date.getDay()];
  return `${dn}, ${date.getDate()} ${MONTH_GENITIVE[state.lang][date.getMonth()]}`;
}

// ============ TIME / DURATION ============
function timeToMinutes(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  return h * 60 + m;
}

function calcDurationHours(day) {
  if (!day || day.dayOff) return null;
  if (!day.start || !day.end) return null;
  const s = timeToMinutes(day.start);
  let e = timeToMinutes(day.end);
  if (s == null || e == null) return null;
  if (e <= s) return null; // нічна зміна — обговоримо потім
  const total = e - s - (day.breakMin || 0);
  if (total <= 0) return null;
  return total / 60;
}

function fmtHours(h) {
  if (h == null) return '—';
  // 1 знак після коми, завжди (8.0, 8.5)
  const v = Math.round(h * 10) / 10;
  return v.toFixed(1);
}

// ============ TOTALS ============
function weekTotal(monday) {
  let sum = 0;
  for (const d of weekDates(monday)) {
    const day = getActiveDays()[isoDate(d)];
    const h = calcDurationHours(day);
    if (h != null) sum += h;
  }
  return sum;
}

function totalUpToWeek(monday) {
  // сума всіх записів, де дата ≤ неділі цього тижня
  const sundayIso = isoDate(addDays(monday, 6));
  let sum = 0;
  for (const [iso, day] of Object.entries(getActiveDays())) {
    if (iso > sundayIso) continue;
    const h = calcDurationHours(day);
    if (h != null) sum += h;
  }
  return sum;
}

// ============ HAPTICS ============
function vibrate(pattern) {
  if (navigator.vibrate) {
    try { navigator.vibrate(pattern); } catch (_) {}
  }
}

// ============ RENDER ============
function render() {
  renderHeader();
  renderDays();
  renderTotals();
}

function renderHeader() {
  document.getElementById('weekRange').textContent = formatWeekRange(currentMonday);
  // показуємо коротко: тиждень N (рахуємо від першого запису)
  const weekNumText = computeWeekLabel();
  document.getElementById('weekNum').textContent = weekNumText;
}

function computeWeekLabel() {
  // Якщо є записи — нумеруємо тижні від тижня першого запису.
  // Інакше — порожній текст.
  const dates = Object.keys(getActiveDays()).sort();
  if (dates.length === 0) return '';
  const firstIso = dates[0];
  const firstMonday = mondayOf(new Date(firstIso));
  const diffDays = Math.round((currentMonday - firstMonday) / 86400000);
  const weekIdx = Math.floor(diffDays / 7) + 1;
  if (weekIdx < 1) return '';
  return `${t('weekN')} ${weekIdx}`;
}

function renderDays() {
  const container = document.getElementById('daysContainer');
  container.innerHTML = '';
  const today = new Date();
  for (const date of weekDates(currentMonday)) {
    const iso = isoDate(date);
    const day = getActiveDays()[iso];
    const row = document.createElement('button');
    row.className = 'day-row' + (sameDay(date, today) ? ' today' : '');
    row.dataset.iso = iso;

    const dayName = document.createElement('div');
    dayName.className = 'day-name';
    dayName.textContent = DAY_NAMES_SHORT[state.lang][date.getDay()];

    const dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = date.getDate();

    const info = document.createElement('div');
    info.className = 'day-info';

    const hours = document.createElement('div');
    hours.className = 'day-hours';

    if (!day) {
      info.classList.add('empty');
      info.textContent = t('addTime');
    } else if (day.dayOff) {
      info.classList.add('dayoff');
      info.textContent = t('dayOffShort');
    } else if (day.start && day.end) {
      info.textContent = `${day.start} → ${day.end}`;
      if (day.breakMin) {
        info.textContent += ` · ${day.breakMin}${state.lang === 'en' ? 'min' : 'хв'}`;
      }
      const h = calcDurationHours(day);
      hours.textContent = fmtHours(h);
    } else {
      info.classList.add('empty');
      info.textContent = t('addTime');
    }

    row.appendChild(dayName);
    row.appendChild(dayNum);
    row.appendChild(info);
    row.appendChild(hours);
    row.addEventListener('click', () => openDayEditor(iso));
    container.appendChild(row);
  }
}

    });

function updateDurationPreview() {
  const el = document.getElementById('durationPreview');
  if (!el) return;
  const h = calcDurationHours(editDraft);
  if (h != null) {
    el.classList.remove('invalid');
    el.textContent = fmtHours(h) + ' ' + t('hours');
    return;
  }
  // h == null — щось не так. Показуємо чому.
  if (!editDraft.start || !editDraft.end) {
    el.classList.remove('invalid');
    el.textContent = '—';
    return;
  }
  const s = timeToMinutes(editDraft.start);
  const e = timeToMinutes(editDraft.end);
  if (s == null || e == null) {
    el.classList.remove('invalid');
    el.textContent = '—';
    return;
  }
  if (e <= s) {
    el.textContent = t('finishMustBeLater');
    el.classList.add('invalid');
    return;
  }
  if ((e - s) - (editDraft.breakMin || 0) <= 0) {
    el.textContent = t('breakTooLong');
    el.classList.add('invalid');
    return;
  }
  el.classList.remove('invalid');
  el.textContent = '—';
}

function saveDayEdit() {
  if (editDraft.dayOff) {
    getActiveWorker().days[editingDate] = { dayOff: true };
  } else {
    const h = calcDurationHours(editDraft);
    if (h == null) {
      vibrate(20);
      // підсвітимо превʼю
      const el = document.getElementById('durationPreview');
      if (el && !el.textContent.includes('—')) {
        // вже показано помилку
      }
      return;
    }
    getActiveWorker().days[editingDate] = {
      start: editDraft.start,
      end: editDraft.end,
      breakMin: editDraft.breakMin || 0,
      dayOff: false
    };
  }

  vibrate([10, 30, 10]);
  closeModal();
  render();
}

function deleteDayEdit() {

  delete getActiveWorker().days[editingDate];
  save();

  closeModal();
  render();
}

// Загальна статистика по всіх записах
function computeStats() {
  const dates = Object.keys(getActiveDays()).sort();
  let totalHours = 0;
  let workDays = 0;
  const weekKeys = new Set();
  for (const iso of dates) {
    const day = getActiveDays()[iso];
    const h = calcDurationHours(day);
    if (h != null) {
      totalHours += h;
      workDays++;
    }
    // тиждень — за понеділком
    if (h != null || (day && day.dayOff)) {
      const m = mondayOf(new Date(iso));
      weekKeys.add(isoDate(m));
    }
  }
  return {
    totalHours,
    workDays,
    weeksCount: weekKeys.size,
    avgPerDay: workDays > 0 ? totalHours / workDays : 0,
    avgPerWeek: weekKeys.size > 0 ? totalHours / weekKeys.size : 0
  };
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ============ HELPERS ============
function runningTotalBeforeWeek(monday) {
  const mondayIso = isoDate(monday);
  let sum = 0;
  for (const [iso, day] of Object.entries(getActiveDays())) {
    if (iso >= mondayIso) continue;
    const h = calcDurationHours(day);
    if (h != null) sum += h;
  }
  return sum;
}

// ============ PDF REPORT ============
// Будує HTML-звіт у #printArea і повертає метадані для імені файлу.
// scope: { type: 'week', monday } або { type: 'all' }
function buildReportHtml(scope) {
  const dates = Object.keys(getActiveDays()).sort();
  if (dates.length === 0) return null;

  let firstMonday, lastMonday, periodStart, periodEnd, titleSuffix;

  if (scope.type === 'week') {
    firstMonday = mondayOf(scope.monday);
    lastMonday = new Date(firstMonday);
    periodStart = firstMonday;
    periodEnd = addDays(firstMonday, 6);
    titleSuffix = formatWeekRange(firstMonday);
  } else {
    firstMonday = mondayOf(new Date(dates[0]));
    lastMonday = mondayOf(new Date(dates[dates.length - 1]));
    periodStart = new Date(dates[0]);
    periodEnd = new Date(dates[dates.length - 1]);
    titleSuffix = `${ddmmyyyy(periodStart)} – ${ddmmyyyy(periodEnd)}`;
  }

  const weeksHtml = [];
  let monday = new Date(firstMonday);
  let running = scope.type === 'week' ? runningTotalBeforeWeek(firstMonday) : 0;
  let weekIdx = scope.type === 'week' ? weekIndexOf(firstMonday) : 1;
  let totalHours = 0;
  let totalWorkDays = 0;
  let activeWeeks = 0;
  let hasAnyContent = false;

  while (monday <= lastMonday) {
    let weekHours = 0;
    let weekHasData = false;
    const dayRowsHtml = [];

    for (const d of weekDates(monday)) {
      const iso = isoDate(d);
      const day = getActiveDays()[iso];
      const dayShort = DAY_NAMES_SHORT[state.lang][d.getDay()];

      if (!day) {
        dayRowsHtml.push(`
          <tr>
            <td class="day-name">${dayShort}</td>
            <td class="date">${ddmmyyyy(d)}</td>
            <td class="time dim">—</td>
            <td class="time dim">—</td>
            <td class="num dim">—</td>
          </tr>`);
      } else if (day.dayOff) {
        weekHasData = true;
        dayRowsHtml.push(`
          <tr>
            <td class="day-name">${dayShort}</td>
            <td class="date">${ddmmyyyy(d)}</td>
            <td class="time dim" colspan="2" style="text-align:center; font-style:italic;">${t('pdfDayOff')}</td>
            <td class="num dim">—</td>
          </tr>`);
      } else {
        const h = calcDurationHours(day);
        if (h != null) {
          weekHours += h;
          weekHasData = true;
          totalWorkDays++;
        }
        dayRowsHtml.push(`
          <tr>
            <td class="day-name">${dayShort}</td>
            <td class="date">${ddmmyyyy(d)}</td>
            <td class="time">${day.start || '—'}</td>
            <td class="time">${day.end || '—'}</td>
            <td class="num">${h != null ? fmtHours(h) : '—'}</td>
          </tr>`);
      }
    }

    // Для тижневого звіту малюємо завжди, для повного — пропускаємо порожні
    if (weekHasData || scope.type === 'week') {
      running += weekHours;
      totalHours += weekHours;
      if (weekHasData) {
        activeWeeks++;
        hasAnyContent = true;
      }
      // У тижневому звіті заголовок секції не потрібен (дата вже в шапці).
      // У повному — обовʼязковий, бо тижнів багато.
      const showHeading = scope.type === 'all';
      const showRunning = scope.type === 'all';
      const sectionClass = showHeading ? '' : 'no-heading';
      const headingHtml = showHeading
        ? `<h2><span class="week-num">${t('pdfWeek')} ${weekIdx}</span>${formatWeekRange(monday)}</h2>`
        : '';
      weeksHtml.push(`
        <section class="week-section ${sectionClass}">
          ${headingHtml}
          <table>
            <thead>
              <tr>
                <th>${t('pdfDay')}</th>
                <th>${t('pdfDate')}</th>
                <th>${t('pdfStart')}</th>
                <th>${t('pdfFinish')}</th>
                <th class="num">${t('pdfDuration')}</th>
              </tr>
            </thead>
            <tbody>${dayRowsHtml.join('')}</tbody>
            <tfoot>
              <tr>
                <td colspan="4" class="total-label">${t('pdfWeekSummary')}</td>
                <td class="num">${fmtHours(weekHours)} ${t('hours')}</td>
              </tr>
              ${showRunning ? `
              <tr class="running-row">
                <td colspan="4" class="total-label">${t('pdfRunningTotal')}</td>
                <td class="num">${fmtHours(running)} ${t('hours')}</td>
              </tr>
              ` : ''}
            </tfoot>
          </table>
        </section>
      `);
      weekIdx++;
    }

    monday = addDays(monday, 7);
  }

  if (scope.type === 'week' && !hasAnyContent) return null;

  const workerName = getActiveWorker().name || t('pdfNoName');

  // Великий центральний підсумок — лише для повного звіту.
  // У тижневому він дублює "Підсумок тижня" в tfoot, тому пропускаємо.
  const grandTotalHtml = scope.type === 'all'
    ? `
      <div class="grand-total">
        <div class="label">${t('pdfTotalForPeriod')}</div>
        <div class="value">${fmtHours(totalHours)}<span class="unit">${t('hours')}</span></div>
        <div class="breakdown">${totalWorkDays} ${t('pdfWorkDaysLabel')} · ${activeWeeks} ${pluralWeeks(activeWeeks)}</div>
      </div>
    `
    : '';

  document.getElementById('printArea').innerHTML = `
    <h1>${t('pdfTitle')}</h1>
    <div class="meta">
      ${escapeHtml(workerName)}<br>
      ${titleSuffix}
    </div>
    ${weeksHtml.join('')}
    ${grandTotalHtml}
  `;

  return {
    hasContent: hasAnyContent,
    filename: scope.type === 'week'
      ? `hodyny_tyzhden_${isoDate(firstMonday)}.pdf`
      : `hodyny_zvit_${isoDate(periodStart)}_${isoDate(periodEnd)}.pdf`
  };
}

function weekIndexOf(monday) {
  const dates = Object.keys(getActiveDays()).sort();
  if (dates.length === 0) return 1;
  const firstMonday = mondayOf(new Date(dates[0]));
  const diffDays = Math.round((monday - firstMonday) / 86400000);
  return Math.max(1, Math.floor(diffDays / 7) + 1);
}

async function exportPdf(scope) {
  const meta = buildReportHtml(scope);
  if (!meta) {
    alert(t('pdfNoData'));
    return;
  }

  const printArea = document.getElementById('printArea');
  // Тимчасово показуємо offscreen, щоб html2canvas міг відрендерити
  printArea.style.display = 'block';
  printArea.style.position = 'fixed';
  printArea.style.left = '-10000px';
  printArea.style.top = '0';

  vibrate(15);

  try {
    // Чекаємо на шрифти, бо інакше html2canvas може зняти fallback
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    const canvas = await html2canvas(printArea, {
      scale: 2,
      backgroundColor: '#ffffff',
      logging: false,
      useCORS: true
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

    const pageW = pdf.internal.pageSize.getWidth();   // 210
    const pageH = pdf.internal.pageSize.getHeight();  // 297
    const margin = 12;
    const contentW = pageW - margin * 2;

    const imgW = contentW;
    const imgH = (canvas.height * imgW) / canvas.width;

    // Якщо все вміщується на одну сторінку
    if (imgH <= pageH - margin * 2) {
      pdf.addImage(canvas, 'JPEG', margin, margin, imgW, imgH, undefined, 'FAST');
    } else {
      // Багато сторінок: ріжемо canvas на частини, кожна = одна сторінка
      const pxPerMm = canvas.width / imgW;
      const pageHpx = (pageH - margin * 2) * pxPerMm;
      let yOffset = 0;
      let pageNum = 0;
      while (yOffset < canvas.height) {
        const sliceH = Math.min(pageHpx, canvas.height - yOffset);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = sliceH;
        const ctx = sliceCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
        ctx.drawImage(canvas, 0, yOffset, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
        if (pageNum > 0) pdf.addPage();
        const sliceHmm = sliceH / pxPerMm;
        pdf.addImage(sliceCanvas, 'JPEG', margin, margin, imgW, sliceHmm, undefined, 'FAST');
        yOffset += sliceH;
        pageNum++;
      }
    }

    const blob = pdf.output('blob');
    const file = new File([blob], meta.filename, { type: 'application/pdf' });

    // Web Share API з файлом — рідне меню Android
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: t('pdfShareTitle'),
          text: getActiveWorker().name ? `${t('pdfShareReport')}: ${getActiveWorker().name}` : t('pdfShareReport')
        });
        vibrate([10, 30, 10]);
      } catch (err) {
        // Користувач закрив діалог — це не помилка
        if (err.name !== 'AbortError') {
          console.warn('Share failed, fallback to download', err);
          downloadPdfBlob(blob, meta.filename);
        }
      }
    } else {
      // Fallback: просто скачати файл
      downloadPdfBlob(blob, meta.filename);
    }
  } catch (e) {
    console.error('PDF export failed', e);
    alert(t('pdfErrorMessage'));
  } finally {
    printArea.style.display = 'none';
    printArea.style.position = '';
    printArea.style.left = '';
    printArea.style.top = '';
  }
}

function downloadPdfBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

  render();
});
document.getElementById('nextWeek').addEventListener('click', () => {

  render();
});
document.getElementById('datePicker').addEventListener('focus', (e) => {

  e.target.value = isoDate(currentMonday);
});

document.getElementById('settingsBtn').addEventListener('click', openSettings);

// ============ BACKUP (експорт/імпорт даних) ============
// Зберігає весь state у JSON-файл і дає його завантажити.
// Файл містить усі роботи, дні і налаштування — повна копія.
function exportBackup() {
  try {
    const payload = {
      // Версія схеми — щоб у майбутньому вміти читати старі бекапи
      schema: 1,
      exportedAt: new Date().toISOString(),
      data: state
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = isoDate(new Date());
    a.href = url;
    a.download = `години-резервна-копія-${today}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    console.warn('Export failed', e);
    alert(t('importError')); // спільне повідомлення про помилку файлу
  }
}

// Читає файл, валідує, заміщує state.
function importBackup(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const parsed = JSON.parse(text);
      // Валідація: має бути обʼєкт з полем data, всередині — workers і activeWorkerId
      const data = parsed.data || parsed; // допускаємо і "сирий" state без обгортки
      if (!data || typeof data !== 'object' || !data.workers || !data.activeWorkerId
          || typeof data.workers !== 'object' || !data.workers[data.activeWorkerId]) {
        throw new Error('Invalid backup');
      }
      if (!confirm(t('importConfirm'))) return;
      // Замінюємо стан повністю, але зберігаємо мову/стиль поточні (бо це налаштування пристрою)
      const keepLang = state.lang;
      const keepStyle = state.style;
      const keepPaper = state.paperMode;
      const keepTerm  = state.termMode;
      state.workers = data.workers;
      state.activeWorkerId = data.activeWorkerId;
      // Якщо в бекапі є мова/стиль — беремо з нього (бо це теж важливо)
      if (data.lang) state.lang = data.lang;
      else state.lang = keepLang;
      if (data.style) state.style = data.style;
      else state.style = keepStyle;
      if (data.paperMode) state.paperMode = data.paperMode;
      else state.paperMode = keepPaper;
      if (data.termMode) state.termMode = data.termMode;
      else state.termMode = keepTerm;
      save();
      applyStyle();
      applyLang(state.lang);
      closeModal();
      render();
      alert(t('importOk'));
    } catch (err) {
      console.warn('Import failed', err);
      alert(t('importError'));
    }
  };
  reader.onerror = () => alert(t('importError'));
  reader.readAsText(file);
}

// ============ STYLE / MODE ============
// Застосовує стиль і його варіацію: ставить data-style + data-mode на <html>,
// оновлює meta theme-color (колір системної смужки в Android Chrome PWA).
function applyStyle() {
  const html = document.documentElement;
  html.setAttribute('data-style', state.style);
  if (state.style === 'paper') {
    html.setAttribute('data-mode', state.paperMode);
  } else {
    html.setAttribute('data-mode', state.termMode);
  }
  const meta = document.getElementById('metaThemeColor');
  if (meta) {
    // theme-color = bg поточної комбінації
    const colors = {
      'paper-light': '#ede0c4',
      'paper-dark':  '#1c1610',
      'terminal-green': '#0a0e0a',
      'terminal-amber': '#0e0a05'
    };
    const key = state.style === 'paper'
      ? `paper-${state.paperMode}`
      : `terminal-${state.termMode}`;
    meta.setAttribute('content', colors[key] || '#ede0c4');
  }
}

// ============ LANGUAGE ============
// Застосовує мову: міняє <html lang>, <title>, footer-label
// (важливо для скрін-рідерів і коректного перенесення слів)
function applyLang(lang) {
  document.documentElement.setAttribute('lang', lang);
  document.title = t('appTitle');
  const footerLabel = document.getElementById('footerLabel');
  if (footerLabel) footerLabel.textContent = t('weekTotalLabel');
}

// ============ SERVICE WORKER ============
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ============ INIT ============
load();
applyStyle();
applyLang(state.lang);
render();
